# =============================================================================
# unibots_description / robot_controllers.yaml
# =============================================================================
# controller_manager configuration for the Unibots UK 2026 mecanum robot.
# Loaded by the gz_ros2_control plugin (see robot.xacro <gazebo> block) and/or
# by ros2_control_node on real hardware.
# =============================================================================

controller_manager:
  ros__parameters:
    # Control loop frequency for the controller_manager.
    update_rate: 50  # Hz

    # ---- Controllers to load ----
    # JointStateBroadcaster publishes /joint_states from the hardware state
    # interfaces (position + velocity of the 4 wheels).
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Holonomic mecanum drive controller. Consumes Twist(Stamped) on
    # ~/reference and commands the 4 wheel velocity interfaces; publishes odom.
    # ASSUMPTION: the ros2_controllers mecanum_drive_controller package is
    # installed and available on ROS 2 Jazzy.
    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

# =============================================================================
# JointStateBroadcaster
# =============================================================================
joint_state_broadcaster:
  ros__parameters:
    # No params required; it auto-discovers all state interfaces. Listed for
    # documentation clarity.
    use_local_topics: false

# =============================================================================
# MecanumDriveController
# =============================================================================
mecanum_drive_controller:
  ros__parameters:

    # ---- Wheel command joint names ----
    # Map the controller's four logical wheels to our ros2_control joints.
    front_left_wheel_command_joint_name:  wheel_fl_joint
    front_right_wheel_command_joint_name: wheel_fr_joint
    rear_left_wheel_command_joint_name:   wheel_rl_joint
    rear_right_wheel_command_joint_name:  wheel_rr_joint

    # ---- Kinematics ----
    kinematics:
      base_frame_offset:
        x: 0.0
        y: 0.0
        theta: 0.0
      wheels_radius: 0.030  # m, wheel radius

      # sum_of_robot_center_projection_on_X_Y_axis = |wx| + |wy|
      #   = 0.065 (half wheelbase, x) + 0.070 (half track, y) = 0.135 m
      # This is the mecanum kinematic constant l = (lx + ly) used to relate
      # body twist to wheel speeds.
      sum_of_robot_center_projection_on_X_Y_axis: 0.135

    # ---- Command timeout ----
    # If no new reference arrives within this window, wheels are halted.
    reference_timeout: 0.15  # s

    # ---- Odometry ----
    # Publish wheel-odometry-derived pose. base_link is the robot body frame.
    base_frame_id: base_link
    odom_frame_id: odom
    enable_odom_tf: true

    # Covariances (diagonal) for the published odometry message.
    pose_covariance_diagonal:  [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    # ---- Command interface type ----
    # Accept geometry_msgs/TwistStamped on the reference topic.
    use_stamped_vel: true
