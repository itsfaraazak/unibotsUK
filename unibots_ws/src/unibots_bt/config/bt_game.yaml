bt_game_node:
  ros__parameters:

    # ── Arena / home ─────────────────────────────────────────────────────────
    home_zone: "north"          # north | east | south | west → deposit/park pose
    wall_offset_m: 0.15         # robot stand-off from the scoring wall
    arena_min: 0.15             # clamp targets to the playable area (matches MPC)
    arena_max: 1.85

    # ── Timing ───────────────────────────────────────────────────────────────
    tick_rate_hz: 20.0
    match_duration_s: 180.0
    endgame_enter_s: 158.0      # leave ~22 s to reach home + dump + settle

    # ── Navigation / capture ─────────────────────────────────────────────────
    goal_tol_m: 0.08
    capture_radius_m: 0.12      # ball in intake blind-spot → SCOOP
    use_predicted_position: true

    # ── Hopper ───────────────────────────────────────────────────────────────
    storage_capacity: 6

    # ── Target selection (utility weights) ───────────────────────────────────
    weight_ping: 4.0            # rulebook points (net)
    weight_steel: 2.0           # rulebook points (net)
    density_bonus: 0.4          # prefer balls in clusters
    occluded_penalty: 0.6       # trust visible balls over occluded

    # ── Actuation dwell ──────────────────────────────────────────────────────
    scoop_duration_s: 1.4       # claw grab dwell
    dump_duration_s: 2.5        # trapdoor open → return

    # ── Search patrol (flat [x0,y0, x1,y1, ...], arena-covering loop) ─────────
    patrol_waypoints: [0.4, 0.4, 1.0, 0.4, 1.6, 0.4, 1.6, 1.0, 1.0, 1.0,
                       0.4, 1.0, 0.4, 1.6, 1.0, 1.6, 1.6, 1.6]
