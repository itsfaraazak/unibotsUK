# ============================================================================
# deploy/docker/docker-compose.yml — run the Unibots match stack on the Pi 5.
# ============================================================================
#   Build:  docker compose -f deploy/docker/docker-compose.yml build
#   Run:    docker compose -f deploy/docker/docker-compose.yml \
#               --env-file deploy/runtime.env up -d
#   Logs:   docker compose -f deploy/docker/docker-compose.yml logs -f
# Runtime config comes from deploy/runtime.env (HOME_ZONE, CONTROLLER, ...).
# ----------------------------------------------------------------------------
services:
  unibots:
    # Cross-built tarball loads as unibots:pi5 (see buildx.sh). Override with
    # IMAGE=... to point at a registry tag. `build` is only used by the on-Pi
    # `docker compose build` path; the prebuilt image skips it.
    image: ${IMAGE:-unibots:pi5}
    build:
      context: ../..                       # repo root (Dockerfile COPYs deploy/ + src)
      dockerfile: deploy/docker/Dockerfile
    container_name: unibots
    restart: unless-stopped                # auto-recover after a crash mid-match
    network_mode: host                     # ROS 2 DDS discovery on the LAN
    ipc: host
    privileged: true                       # GPIO / I2C / V4L2 access on the Pi 5

    # Pass the match-day runtime knobs through to deploy/run.sh.
    environment:
      HOME_ZONE: ${HOME_ZONE:-north}
      CONTROLLER: ${CONTROLLER:-mpc}
      HARDWARE: ${HARDWARE:-true}
      CAMERA: ${CAMERA:-true}
      LOCALIZATION: ${LOCALIZATION:-true}
      USE_SIM_TIME: ${USE_SIM_TIME:-false}
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-42}

    devices:
      - /dev/gpiochip0:/dev/gpiochip0       # Pi 5 GPIO (motors)
      - /dev/gpiochip4:/dev/gpiochip4       # Pi 5 secondary GPIO bank
      - /dev/i2c-1:/dev/i2c-1               # servo PWM
      # - /dev/video0:/dev/video0           # camera (uncomment / adjust index)

    volumes:
      # Live source mount → incremental `colcon build` INSIDE the container on
      # match day without rebuilding the image. (Edit, rebuild, restart.)
      - ../../unibots_ws/src:/opt/unibots/unibots_ws/src:rw
      - /dev:/dev
