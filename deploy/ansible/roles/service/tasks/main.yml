# Write runtime.env from the playbook vars and install the boot service.
---
- name: Render runtime.env on the robot
  ansible.builtin.template:
    src: runtime.env.j2
    dest: "{{ repo_dir }}/deploy/runtime.env"
    mode: "0644"
  become: false

- name: Install the systemd service
  ansible.builtin.template:
    src: unibots.service.j2
    dest: "/etc/systemd/system/{{ service_name }}.service"
    mode: "0644"

- name: Enable and (re)start the match service
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    enabled: true
    state: restarted
    daemon_reload: true
